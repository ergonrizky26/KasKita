<!DOCTYPE html>
<html>
<head>
  <title>KasKita</title>

  <link rel="icon" type="image/png" href="assets/kaskita-icon-blackk.png">
  <link rel="apple-touch-icon" href="assets/kaskita-icon-blackk.png">
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbw8oa-vWSjc7pVV2Fke2DzV41h17LhTj4P8WCpDF8S3srQKLXiwqJnntafQ2gJK4nsg/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
